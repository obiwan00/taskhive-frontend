<div class="projects-page">
  <div class="page-header">
    <div class="page-header-text">
      <h1 class="page-title">Projects</h1>
      <p class="page-subtitle">Manage and track your projects in one place</p>
    </div>
    <button mat-raised-button color="primary" (click)="onCreateProject()">
      <mat-icon>add</mat-icon>
      Create Project
    </button>
  </div>

  <app-projects-filters (filterChange)="onFilterChange($event)"/>

  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="50"></mat-spinner>
    </div>
  }

  @if (error()) {
    <app-info-block type="error">
      {{ error() }}
    </app-info-block>
  }

  @if (!loading() && !error()) {
    <app-projects-table
      [projects]="projects()"
      [totalCount]="totalCount()"
      [pageSize]="currentPageSize()"
      [pageIndex]="currentPage()"
      (rowClick)="onRowClick($event)"
      (pageChange)="onPageChange($event)"
    />
  }
</div>
