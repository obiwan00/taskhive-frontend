<div class="filters-container">
  <mat-form-field class="search-field">
    <mat-label>Search projects</mat-label>
    <input
      matInput
      type="text"
      [formControl]="searchControl"
      placeholder="Search by title or description"
    />
    @if (searchControl.value) {
      <button
        matSuffix
        mat-icon-button
        type="button"
        (click)="clearSearch()"
        aria-label="Clear search">
        <mat-icon>close</mat-icon>
      </button>
    }
    @if (searchControl.invalid && searchControl.touched) {
      <mat-error>{{ searchControl.errors | validationMessage }}</mat-error>
    }
  </mat-form-field>

  <mat-form-field class="role-filter">
    <mat-label>Filter by role</mat-label>
    <mat-select [formControl]="roleControl">
      <mat-option [value]="null">All roles</mat-option>
      @for (role of availableRoles; track role.value) {
        <mat-option [value]="role.value">{{ role.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
