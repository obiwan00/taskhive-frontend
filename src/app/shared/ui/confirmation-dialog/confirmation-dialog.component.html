<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p class="dialog-message">{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">{{ cancelText }}</button>
  <button
    mat-raised-button
    color="warn"
    (click)="onConfirm()"
  >
    {{ confirmText }}
  </button>
</mat-dialog-actions>
